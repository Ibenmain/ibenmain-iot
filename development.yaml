apiVersion: apps/v1
kind: Deployment
metadata:
  name: playground-app
spec:
  replicas: 2                     # number of pods
  selector:
    matchLabels:
      app: playground
  template:
    metadata:
      labels:
        app: playground
    spec:
      containers:
      - name: playground
        image: wil42/playground:v1   # <--- version tag
        ports:
        - containerPort: 8888
